<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperTrader</title>

    <link rel="stylesheet" href="web.css">

    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>

<body>

    <div class="page-bg"></div>
    <div class="gold-lines"></div>

    <main class="link-page">

        <section class="link-hero">

            <div class="market-card market-left">
                <span>EUR/USD</span>
                <strong>1.0842</strong>
                <small class="up">▲ +0.24%</small>
            </div>

            <div class="market-card market-right">
                <span>NAS100</span>
                <strong>19,842</strong>
                <small class="up">▲ +1.12%</small>
            </div>

            <div class="market-card market-bottom">
                <span>BTC/USD</span>
                <strong>67,420</strong>
                <small class="down">▼ -0.38%</small>
            </div>

            <div class="brand-center">
                <img src="supertrader.png" alt="Super Trader" class="main-logo">

                <div class="brand-line">
                    <span>TU MENTOR</span>
                    <i></i>
                    <span>TU EDGE</span>
                    <i></i>
                    <span>TU LIBERTAD</span>
                </div>

                <div class="brand-divider"></div>

                <div class="link-buttons">

                    <button class="link-btn link-btn-primary" id="btnAprende">
                        <span class="link-icon">
                            <i data-lucide="graduation-cap"></i>
                        </span>

                        <strong>Aprende conmigo</strong>

                        <span class="link-arrow">
                            <i data-lucide="chevron-right"></i>
                        </span>
                    </button>

                    <button class="link-btn" id="btnCopyTrading">
                        <span class="link-icon">
                            <i data-lucide="bar-chart-3"></i>
                        </span>

                        <strong>Copy Trading</strong>

                        <span class="link-arrow">
                            <i data-lucide="chevron-right"></i>
                        </span>
                    </button>

                </div>

                <div class="social-row">
                    <a href="#" aria-label="YouTube">
                        <i data-lucide="youtube"></i>
                    </a>

                    <a href="#" aria-label="TikTok">
                        <i data-lucide="music-2"></i>
                    </a>

                    <a href="#" aria-label="Instagram">
                        <i data-lucide="instagram"></i>
                    </a>

                    <a href="#" aria-label="Telegram">
                        <i data-lucide="send"></i>
                    </a>

                    <a href="#" aria-label="WhatsApp">
                        <i data-lucide="message-circle"></i>
                    </a>
                </div>

                <p class="risk-text">
                    El trading implica riesgos.
                    <a href="#">Política de privacidad</a>
                </p>
            </div>

        </section>

    </main>

    <!-- MODAL COPY TRADING -->
    <div class="modal-copy" id="modalCopy">
        <div class="modal-copy-backdrop" id="modalCopyBackdrop"></div>

        <div class="modal-copy-card">

            <button class="modal-copy-close" id="cerrarModalCopy">
                <i data-lucide="x"></i>
            </button>

            <div id="copyTradingContent" class="copytrading-content">
                <!-- Acá se cargará copytrading.html desde web.js -->
            </div>

        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>

    <script src="web.js"></script>
</body>
</html>
