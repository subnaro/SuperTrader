<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SuperTrader Academy</title>

  <link rel="stylesheet" href="academia.css" />
  <link rel="stylesheet" href="dashboard.css" />
</head>

<body>
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="logo">
        <span>S</span><b>T</b>
      </div>

      <div>
        <h2>SUPER<span>TRADER</span></h2>
        <p>ACADEMY</p>
      </div>
    </div>

    <nav class="menu">
      <button class="menu-item active">
        <span class="menu-icon">
          <svg viewBox="0 0 24 24">
            <path d="M3 11L12 4l9 7v9a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1v-9z"/>
          </svg>
        </span>
        <b>Dashboard</b>
      </button>

      <button class="menu-item">
        <span class="menu-icon">
          <svg viewBox="0 0 24 24">
            <path d="M3 7l9-4 9 4-9 4-9-4z"/>
            <path d="M7 10v5c0 1.5 2.5 3 5 3s5-1.5 5-3v-5"/>
          </svg>
        </span>
        <b>Cursos</b>
      </button>

      <button class="menu-item">
        <span class="menu-icon">
          <svg viewBox="0 0 24 24">
            <path d="M8 17a6 6 0 0 1 0-10"/>
            <path d="M16 7a6 6 0 0 1 0 10"/>
            <path d="M5 20a10 10 0 0 1 0-16"/>
            <path d="M19 4a10 10 0 0 1 0 16"/>
            <circle cx="12" cy="12" r="2"/>
          </svg>
        </span>
        <b>Señales</b>
      </button>

      <button class="menu-item">
        <span class="menu-icon">
          <svg viewBox="0 0 24 24">
            <rect x="4" y="5" width="16" height="16" rx="2"/>
            <path d="M8 3v4M16 3v4M4 10h16"/>
            <circle cx="17" cy="17" r="3"/>
          </svg>
        </span>
        <b>En Vivo</b>
      </button>

      <button class="menu-item">
        <span class="menu-icon">
          <svg viewBox="0 0 24 24">
            <path d="M4 18h16l-2-10-4 4-2-7-2 7-4-4-2 10z"/>
            <path d="M4 21h16"/>
          </svg>
        </span>
        <b>Membresía</b>
      </button>

      <button class="menu-item">
        <span class="menu-icon">
          <svg viewBox="0 0 24 24">
            <rect x="4" y="4" width="16" height="16" rx="2"/>
            <path d="M8 8h8M8 12h8M8 16h5"/>
          </svg>
        </span>
        <b>Noticias</b>
      </button>

      <button class="menu-item">
        <span class="menu-icon">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 21c1.5-4 14.5-4 16 0"/>
          </svg>
        </span>
        <b>Perfil</b>
      </button>
    </nav>

    <div class="sidebar-card">
      <div class="sidebar-card-icon">
        <svg viewBox="0 0 24 24">
          <path d="M12 3l2.8 5.7 6.2.9-4.5 4.4 1.1 6.2L12 17.3 6.4 20.2 7.5 14 3 9.6l6.2-.9L12 3z"/>
        </svg>
      </div>

      <h3>
        Desbloquea<br />
        <span>todo tu potencial</span>
      </h3>

      <p>
        Continúa aprendiendo y lleva tu trading al siguiente nivel.
      </p>

      <button type="button">
        Ver programas →
      </button>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <button class="menu-mobile" id="menuMobile" type="button">☰</button>

      <div></div>

      <div class="user-area">
        <button class="notification" type="button">
          <svg viewBox="0 0 24 24">
            <path d="M18 8a6 6 0 0 0-12 0c0 7-3 8-3 8h18s-3-1-3-8"/>
            <path d="M10 21h4"/>
          </svg>
          <span>3</span>
        </button>

        <div class="avatar">
          <img src="https://i.pravatar.cc/100?img=12" alt="Avatar usuario" />
        </div>

        <div class="user-info">
          <h3>Gaston Orozco</h3>
          <p>Membresia Premiun <span>★</span></p>
        </div>
      </div>
    </header>

    <section id="moduloContenido" class="modulo-contenido"></section>
  </main>

  <script src="academia.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
