<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Súper Trader | Trading</title>

    <link rel="stylesheet" href="styles.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
          rel="stylesheet">
</head>
<body>

    <canvas id="particles"></canvas>

    <div class="scan-line"></div>

    <div class="market-card card-eurusd">
        <span>EUR/USD</span>
        <strong>1.0842</strong>
        <small>▲ +0.24%</small>
    </div>

    <div class="market-card card-nas100">
        <span>NAS100</span>
        <strong>19,842</strong>
        <small>▲ +1.12%</small>
    </div>

    <div class="market-card card-btc">
        <span>BTC/USD</span>
        <strong>67,420</strong>
        <small>▼ -0.38%</small>
    </div>

    <div class="background-glow"></div>
    <div class="candles-bg"></div>
    <div class="noise-bg"></div>

    <main class="page">

        <section class="profile-card">

            <div class="brand-logo">
                <img src="supertrader.png" alt="Súper Trader">
            </div>

            <h1>SÚPER TRADER</h1>

            <p class="subtitle">
                TU MENTOR <span>•</span> TU EDGE <span>•</span> TU LIBERTAD
            </p>

            <div class="mini-line"></div>

            <div class="links">

                <a href="#" class="link-btn featured">
                    <div class="link-left">
                        <i class="fa-solid fa-graduation-cap"></i>
                        <span>Aprende conmigo</span>
                    </div>
                    <div class="arrow">
                        <i class="fa-solid fa-chevron-right"></i>
                    </div>
                </a>

                <a href="#" class="link-btn">
                    <div class="link-left">
                        <i class="fa-solid fa-chart-simple"></i>
                        <span>Copy Trading</span>
                    </div>
                    <div class="arrow">
                        <i class="fa-solid fa-chevron-right"></i>
                    </div>
                </a>

                <a href="#" class="link-btn">
                    <div class="link-left">
                        <i class="fa-solid fa-arrow-trend-up"></i>
                        <span>PropXP</span>
                    </div>
                    <div class="arrow">
                        <i class="fa-solid fa-chevron-right"></i>
                    </div>
                </a>

                <a href="#" class="link-btn">
                    <div class="link-left">
                        <i class="fa-solid fa-rotate"></i>
                        <span>Exchange</span>
                    </div>
                    <div class="arrow">
                        <i class="fa-solid fa-chevron-right"></i>
                    </div>
                </a>

                <a href="#" class="link-btn">
                    <div class="link-left">
                        <i class="fa-solid fa-chart-column"></i>
                        <span>MyFXBook</span>
                    </div>
                    <div class="arrow">
                        <i class="fa-solid fa-chevron-right"></i>
                    </div>
                </a>

                <a href="#" class="link-btn">
                    <div class="link-left">
                        <i class="fa-solid fa-building-columns"></i>
                        <span>Broker</span>
                    </div>
                    <div class="arrow">
                        <i class="fa-solid fa-chevron-right"></i>
                    </div>
                </a>

            </div>

            <div class="socials">

                <a href="#" aria-label="YouTube">
                    <i class="fa-brands fa-youtube"></i>
                </a>

                <a href="#" aria-label="Kick">
                    <i class="fa-solid fa-k"></i>
                </a>

                <a href="#" aria-label="Instagram">
                    <i class="fa-brands fa-instagram"></i>
                </a>

                <a href="#" aria-label="Telegram">
                    <i class="fa-brands fa-telegram"></i>
                </a>

                <a href="#" aria-label="WhatsApp">
                    <i class="fa-brands fa-whatsapp"></i>
                </a>

            </div>

            <footer>
                <span>El trading implica riesgos.</span>
                <a href="#">Política de privacidad</a>
            </footer>

        </section>

    </main>

    <script src="app.js"></script>

</body>
</html>
